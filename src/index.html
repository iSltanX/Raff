<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <title>رفّ</title>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <main class="panel" id="panel">
    <div class="search-row">
      <span class="search-icon" id="search-icon" aria-hidden="true"></span>
      <input
        id="search"
        class="search-input"
        type="text"
        placeholder="ابحث في رفّك…"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        aria-label="ابحث في رفّك"
      />
      <span class="esc-chip" id="esc-chip" hidden>esc</span>
    </div>
    <div class="divider"></div>
    <div class="list scroll-pane" id="list" role="listbox" aria-label="عناصر الحافظة"></div>
    <div class="divider"></div>
    <footer class="footer">
      <!-- .keys isolates each shortcut so the bidi algorithm can't flip
           ⌥P into P⌥ inside the RTL line. -->
      <span class="hint"><span class="keys">↑↓</span> تنقّل</span>
      <span class="hint"><span class="keys">⏎</span> لصق</span>
      <span class="hint"><span class="keys">⌥P</span> تثبيت</span>
      <span class="hint"><span class="keys">⌘F</span> بحث</span>
      <span class="hint"><span class="keys">esc</span> إغلاق</span>
      <span class="toast" id="toast" hidden></span>
    </footer>
  </main>
  <script type="module" src="js/panel.js"></script>
</body>
</html>

<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <title>رفّ</title>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <main class="panel" id="panel">
    <div class="panel-titlebar">
      <div class="panel-brand">
        <img class="panel-mark" src="assets/brand/raff-mark.svg" alt="" width="23" height="23" aria-hidden="true" />
        <strong>رفّ</strong>
      </div>
      <div class="panel-title-actions">
        <span class="privacy-chip" id="privacy-chip" title="كل شيء على جهازك">محلي</span>
      </div>
    </div>

    <div class="search-field" id="search-field">
      <span class="search-icon" id="search-icon" aria-hidden="true"></span>
      <input
        id="search"
        class="search-input"
        type="text"
        placeholder="ابحث في رفّك…"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        aria-label="ابحث في رفّك"
      />
      <span class="esc-chip" id="esc-chip" hidden>esc</span>
      <kbd class="search-kbd" aria-hidden="true">⌘F</kbd>
    </div>

    <div class="list scroll-pane" id="list" role="listbox" aria-label="عناصر الحافظة"></div>

    <footer class="footer">
      <!-- .keys isolates each shortcut so the bidi algorithm can't flip
           ⌥P into P⌥ inside the RTL line. -->
      <span class="hint"><kbd class="keys">↑↓</kbd> تنقّل</span>
      <span class="hint"><kbd class="keys">⏎</kbd> لصق</span>
      <span class="hint"><kbd class="keys">⌥P</kbd> تثبيت</span>
      <i class="footer-spacer"></i>
      <span class="toast" id="toast" hidden></span>
    </footer>
  </main>
  <script type="module" src="js/panel.js"></script>
</body>
</html>
